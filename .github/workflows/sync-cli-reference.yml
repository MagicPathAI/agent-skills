name: Sync CLI reference

on:
  repository_dispatch:
    types: [cli-release]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Regenerate cli-reference.md from the published CLI
        run: npx -y magicpath-ai@experimental docs --format md > skills/magicpath/references/cli-reference.md

      - name: Open PR if the reference changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: Regenerate cli-reference.md from magicpath-ai@latest
          title: Sync CLI reference with latest magicpath-ai release
          body: Auto-generated by the sync-cli-reference workflow from `magicpath-ai docs --format md`.
          branch: sync-cli-reference
          delete-branch: true
